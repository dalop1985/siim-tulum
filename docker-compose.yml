services:
  db:
    image: postgres:16
    container_name: siim_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siim}
      POSTGRES_USER: ${POSTGRES_USER:-siim_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiar_esta_password}
    ports:
      - "5432:5432"
    volumes:
      - siim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siim_app} -d ${POSTGRES_DB:-siim}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: siim_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: siim_api
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

# Nota: los scripts de database/ se aplican con Alembic (o manualmente).
# No se montan en /docker-entrypoint-initdb.d porque ISABI/CONAC aún están
# en T-SQL (pendiente de portar a PostgreSQL — ver ROADMAP.md).

volumes:
  siim_pgdata:
